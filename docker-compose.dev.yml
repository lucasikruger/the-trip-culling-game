# Development mode: hot reload, source mounted
# Usage: docker compose -f docker-compose.dev.yml up
#
# First run installs packages into a named volume.
# If you change package.json, run: docker compose -f docker-compose.dev.yml down -v

services:
  app:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && node scripts/seed.js && npm run dev"
    ports:
      - "4321:4321"
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
